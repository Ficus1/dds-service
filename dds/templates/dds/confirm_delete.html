{% extends 'dds/base.html' %}
{% block title %}Удаление{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white fw-bold">Подтверждение удаления</div>
      <div class="card-body">
        <p>Вы уверены, что хотите удалить <strong>{{ object }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
