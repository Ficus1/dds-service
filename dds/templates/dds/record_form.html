{% extends 'dds/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header fw-bold">{{ title }}</div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}

          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}{% if field.field.required %} <span class="text-danger">*</span>{% endif %}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
            {% endif %}
          </div>
          {% endfor %}

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'dds:index' %}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Каскадный выбор: Тип → Категория → Подкатегория
const typeSelect    = document.getElementById('id_transaction_type');
const catSelect     = document.getElementById('id_category');
const subcatSelect  = document.getElementById('id_subcategory');

function updateSelect(select, data, placeholder) {
  select.innerHTML = `<option value="">${placeholder}</option>`;
  data.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.id;
    opt.textContent = item.name;
    select.appendChild(opt);
  });
}

typeSelect.addEventListener('change', function () {
  fetch(`/api/categories/?type_id=${this.value}`)
    .then(r => r.json())
    .then(data => {
      updateSelect(catSelect, data, '---------');
      updateSelect(subcatSelect, [], '---------');
    });
});

catSelect.addEventListener('change', function () {
  fetch(`/api/subcategories/?category_id=${this.value}`)
    .then(r => r.json())
    .then(data => updateSelect(subcatSelect, data, '---------'));
});
</script>
{% endblock %}
